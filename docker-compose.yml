services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: previsao
      POSTGRES_PASSWORD: previsao
      POSTGRES_DB: previsao
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U previsao -d previsao"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://previsao:previsao@db:5432/previsao
      NODE_ENV: production
    expose:
      - "3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Proxy reverso com HTTPS automático (Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:
